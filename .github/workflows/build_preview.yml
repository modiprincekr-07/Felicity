name: Build APKs (Preview)

on:
  workflow_dispatch:

jobs:
  build-arm64-v8a:
    name: Build arm64-v8a
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java and Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build arm64-v8a Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleFossDebug --no-build-cache --rerun-tasks

      - name: Rename and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: felicity-foss-arm64-v8a-debug
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error
